# Local dev infrastructure — mirrors production (Postgres + R2) without touching any cloud.
# Postgres stands in for Railway Postgres; MinIO stands in for Cloudflare R2 (S3-compatible).
#
#   docker compose -f infra/docker-compose.yml up -d
#
# Data persists under infra/data/ (git-ignored).

services:
  postgres:
    image: postgres:16-alpine
    container_name: bimhive_postgres
    environment:
      POSTGRES_USER: bimhive
      POSTGRES_PASSWORD: bimhive
      POSTGRES_DB: bimhive
    ports:
      - "5432:5432"
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bimhive -d bimhive"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: bimhive_minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: bimhive
      MINIO_ROOT_PASSWORD: bimhive-minio-secret
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # web console
    volumes:
      - ./data/minio:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 5

  # One-shot: create the local bucket so the app has somewhere to write immediately.
  minio-setup:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 bimhive bimhive-minio-secret &&
      mc mb --ignore-existing local/bhmarketplacev2 &&
      echo 'MinIO bucket bhmarketplacev2 ready';
      "
